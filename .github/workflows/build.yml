name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Test
        run: pytest

  # Standalone executables. PyInstaller builds per-platform: the
  # windows-latest job produces stockscan.exe.
  executable:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e ".[build]"
      - name: Build executable
        run: pyinstaller stockscan.spec
      - name: Smoke test
        run: ./dist/stockscan providers
        shell: bash
      - uses: actions/upload-artifact@v4
        with:
          name: stockscan-${{ runner.os }}
          path: dist/stockscan*
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          case "${{ runner.os }}" in
            Windows) asset="stockscan-windows.exe"; cp dist/stockscan.exe "$asset" ;;
            macOS)   asset="stockscan-macos";       cp dist/stockscan "$asset" ;;
            *)       asset="stockscan-linux";       cp dist/stockscan "$asset" ;;
          esac
          gh release upload "${GITHUB_REF_NAME}" "$asset" --clobber || \
            gh release create "${GITHUB_REF_NAME}" "$asset" --generate-notes
